spring:
  application:
    name: ecommerce
  
  datasource:
    url: jdbc:postgresql://localhost:5432/mall
    username: malluser
    password: mallpassword
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # [CRITICAL] Hibernate 7 JSON Mapping Fix
        # Spring Boot 4.x는 Jackson 3(tools.jackson)를 사용하지만, 
        # Hibernate 7은 여전히 Jackson 2(com.fasterxml.jackson) 패키지를 요구함.
        # 명시적인 FormatMapper 설정 없이는 jsonb 타입 매핑 시 NoClassDefFoundError 발생.
        type:
          json_format_mapper: jackson
  
  data:
    redis:
      host: localhost
      port: 6379
  
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ecommerce-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
