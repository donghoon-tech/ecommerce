<!DOCTYPE html>
<html th:replace="~{admin/layout :: layout(~{::main})}">
<body>
<main>
    <div class="pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Add New Product (Advanced SKU)</h1>
    </div>

    <form id="productForm" class="mb-5">
        <div class="row mb-3">
            <div class="col-md-6">
                <label for="name" class="form-label">Product Name</label>
                <input type="text" class="form-control" id="name" required>
            </div>
            <div class="col-md-3">
                <label for="basePrice" class="form-label">Base Price</label>
                <input type="number" class="form-control" id="basePrice" required>
            </div>
            <div class="col-md-3">
                <label for="category" class="form-label">Category</label>
                <select class="form-select" id="categoryId" required onchange="loadAttributes(this.value)">
                    <option value="">Select Category</option>
                    <option th:fragment="catOption(nodes, depth)" th:each="node : ${nodes}" 
                            th:value="${node.id}" 
                            th:text="${'--'.repeat(depth) + ' ' + node.name}">
                    </option>
                    <div th:replace="~{::catOption(${categories}, 0)}"></div>
                </select>
            </div>
        </div>

        <!-- Section 1: Common Product Specs (isOption = false) -->
        <div id="commonAttributeSection" class="mb-4 card d-none">
            <div class="card-header">Product Common Specs (JSONB)</div>
            <div class="card-body" id="commonAttributeFields">
                <!-- Dynamically loaded -->
            </div>
        </div>

        <!-- Section 2: SKUs with Options (isOption = true) -->
        <div class="mb-4 card">
            <div class="card-header d-flex justify-content-between align-items-center">
                SKUs & Selling Options
                <button type="button" class="btn btn-sm btn-success" id="addSkuBtn" onclick="addSkuRow()" disabled>Add SKU</button>
            </div>
            <div class="card-body">
                <table class="table table-bordered" id="skuTable">
                    <thead>
                        <tr id="skuTableHeader">
                            <th>SKU Code</th>
                            <!-- Dynamic Option Columns -->
                            <th>Additional Price</th>
                            <th>Stock</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Save Product</button>
    </form>

    <script>
        let currentOptions = []; // isOption = true attributes

        async function loadAttributes(categoryId) {
            const addSkuBtn = document.getElementById('addSkuBtn');
            const skuTableBody = document.querySelector('#skuTable tbody');
            const commonSection = document.getElementById('commonAttributeSection');
            const commonFields = document.getElementById('commonAttributeFields');
            const tableHeader = document.getElementById('skuTableHeader');

            if (!categoryId) {
                commonSection.classList.add('d-none');
                addSkuBtn.disabled = true;
                return;
            }

            const response = await fetch(`/api/v1/categories/${categoryId}/attributes`);
            const attributes = await response.json();
            
            // 1. Split attributes
            const commons = attributes.filter(a => !a.isOption);
            currentOptions = attributes.filter(a => a.isOption);

            // 2. Render Common Specs
            commonFields.innerHTML = '';
            if (commons.length > 0) {
                commonSection.classList.remove('d-none');
                commons.forEach(attr => {
                    const div = document.createElement('div');
                    div.className = 'mb-3';
                    div.innerHTML = `
                        <label class="form-label">${attr.name} (${attr.attributeType})${attr.required ? ' *' : ''}</label>
                        <input type="${attr.attributeType === 'NUMBER' ? 'number' : 'text'}" 
                               class="form-control common-attr-input" 
                               data-name="${attr.name}" 
                               ${attr.required ? 'required' : ''}>
                    `;
                    commonFields.appendChild(div);
                });
            } else {
                commonSection.classList.add('d-none');
            }

            // 3. Update SKU Table Header
            tableHeader.innerHTML = '<th>SKU Code</th>';
            currentOptions.forEach(opt => {
                const th = document.createElement('th');
                th.innerText = `${opt.name} (${opt.attributeType})`;
                tableHeader.appendChild(th);
            });
            tableHeader.innerHTML += '<th>Add. Price</th><th>Stock</th><th>Action</th>';

            // 4. Reset SKU Table
            skuTableBody.innerHTML = '';
            addSkuBtn.disabled = false;
            addSkuRow(); // Add initial row
        }

        function addSkuRow() {
            const tbody = document.querySelector('#skuTable tbody');
            const row = document.createElement('tr');
            
            let html = `<td><input type="text" class="form-control sku-code" required placeholder="e.g. SKU-001"></td>`;
            
            // Dynamic columns for each option attribute
            currentOptions.forEach(opt => {
                html += `<td>
                    <input type="${opt.attributeType === 'NUMBER' ? 'number' : 'text'}" 
                           class="form-control sku-option-input" 
                           data-name="${opt.name}" 
                           required>
                </td>`;
            });

            html += `
                <td><input type="number" class="form-control sku-price" value="0" required></td>
                <td><input type="number" class="form-control sku-stock" value="0" required></td>
                <td><button type="button" class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">Remove</button></td>
            `;
            
            row.innerHTML = html;
            tbody.appendChild(row);
        }

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // Product common attributes
            const productAttributes = {};
            document.querySelectorAll('.common-attr-input').forEach(input => {
                productAttributes[input.dataset.name] = input.value;
            });

            // SKU list
            const skus = [];
            const rows = document.querySelectorAll('#skuTable tbody tr');
            
            if (rows.length === 0) {
                alert('At least one SKU is required.');
                return;
            }

            rows.forEach(row => {
                const skuOptions = {};
                row.querySelectorAll('.sku-option-input').forEach(input => {
                    skuOptions[input.dataset.name] = input.value;
                });

                skus.push({
                    skuCode: row.querySelector('.sku-code').value,
                    attributes: skuOptions,
                    additionalPrice: parseFloat(row.querySelector('.sku-price').value),
                    stockQuantity: parseInt(row.querySelector('.sku-stock').value)
                });
            });

            const data = {
                name: document.getElementById('name').value,
                basePrice: parseFloat(document.getElementById('basePrice').value),
                categoryId: parseInt(document.getElementById('categoryId').value),
                attributes: productAttributes,
                skus: skus
            };

            const response = await fetch('/api/v1/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('Advanced Product saved successfully!');
                window.location.href = '/admin/products';
            } else {
                alert('Failed to save product.');
            }
        };
    </script>
</main>
</body>
</html>
