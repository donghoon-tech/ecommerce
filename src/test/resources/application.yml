spring:
  datasource:
    # PostgreSQL 모드로 설정하여 Product 엔티티의 'jsonb' 컬럼 정의 호환성 유지
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        # [CRITICAL] Hibernate 7 JSON Mapping Fix
        # Spring Boot 4.x(Jackson 3)와 Hibernate 7(Jackson 2 요구) 간의 의존성 불일치 해결.
        # Jackson 2 라이브러리가 classpath에 존재해야 하며, Hibernate에 수동 매핑 지시가 필요함.
        type:
          json_format_mapper: jackson
  
  data:
    redis:
      host: localhost
      port: 6379
  
  kafka:
    bootstrap-servers: localhost:9092
